<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Inicio | ClassClick</title>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ClassClick" />

    <link rel="manifest" href="/public/manifest.json" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192.png" />

    <link rel="icon" type="image/png" href="/public/icons/favicon.png" />

    <link rel="shortcut icon" href="/public/icons/favicon.png" />

    <link rel="stylesheet" href="/public/assets/app.css" />

    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 320ms ease-out both;
        }

        .glass {
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        @keyframes heroShine {
            0% {
                transform: translateX(-120%) skewX(-18deg);
                opacity: 0;
            }

            25% {
                opacity: 0.35;
            }

            55% {
                opacity: 0.12;
            }

            100% {
                transform: translateX(140%) skewX(-18deg);
                opacity: 0;
            }
        }

        .hero-shine {
            background: linear-gradient(110deg,
                    transparent 0%,
                    transparent 42%,
                    rgba(255, 255, 255, 0.35) 48%,
                    transparent 55%,
                    transparent 100%);

            animation: heroShine 4.8s ease-in-out infinite;
        }
    </style>

</head>

<body class="bg-slate-100">

    <div id="app"></div>

    <script type="module" src="/src/pages/student/home/index.js"></script>

</body>

</html>
