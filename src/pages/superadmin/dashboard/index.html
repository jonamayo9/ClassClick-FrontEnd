<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperAdmin | ClassClick</title>
  <link rel="stylesheet" href="/public/assets/app.css" />
</head>
<body class="min-h-screen bg-slate-100">
  <div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div>
          <h1 class="text-xl font-bold text-slate-900">ClassClick</h1>
          <p class="text-sm text-slate-500">Panel SuperAdmin</p>
        </div>

        <button
          id="logoutButton"
          type="button"
          class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
          Cerrar sesión
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <section class="mb-6">
        <div class="card p-6">
          <p class="text-sm text-slate-500">Bienvenido</p>
          <h2 id="welcomeName" class="mt-1 text-2xl font-bold text-slate-900">-</h2>
          <p id="welcomeMeta" class="mt-2 text-sm text-slate-600"></p>
        </div>
      </section>

      <section class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <a
          href="/src/pages/superadmin/companies/index.html"
          class="card block p-6 transition hover:-translate-y-0.5 hover:shadow-md">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h3 class="text-lg font-semibold text-slate-900">Empresas</h3>
              <p class="mt-2 text-sm text-slate-600">
                Ver, administrar y crear empresas del sistema.
              </p>
            </div>
            <span class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700">
              Módulo
            </span>
          </div>
        </a>

        <a
          href="/src/pages/superadmin/admins/index.html"
          class="card block p-6 transition hover:-translate-y-0.5 hover:shadow-md">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h3 class="text-lg font-semibold text-slate-900">Admins</h3>
              <p class="mt-2 text-sm text-slate-600">
                Ver admins, crear nuevos y asignar empresas.
              </p>
            </div>
            <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">
              Módulo
            </span>
          </div>
        </a>
      </section>

      <section class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
        <button
          id="createCompanyShortcut"
          type="button"
          class="card p-6 text-left transition hover:-translate-y-0.5 hover:shadow-md">
          <h3 class="text-lg font-semibold text-slate-900">Crear empresa</h3>
          <p class="mt-2 text-sm text-slate-600">
            Atajo para ir al alta de empresa.
          </p>
        </button>

        <button
          id="createAdminShortcut"
          type="button"
          class="card p-6 text-left transition hover:-translate-y-0.5 hover:shadow-md">
          <h3 class="text-lg font-semibold text-slate-900">Crear admin</h3>
          <p class="mt-2 text-sm text-slate-600">
            Atajo para ir al alta de administrador.
          </p>
        </button>
      </section>
    </main>
  </div>

  <script type="module" src="/src/pages/superadmin/dashboard/index.js"></script>
</body>
</html>
