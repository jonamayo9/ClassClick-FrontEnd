<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassClick</title>

  <link rel="manifest" href="/public/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="/public/assets/app.css" />
</head>

<body class="min-h-screen bg-slate-950">

  <main
    class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-8 bg-[radial-gradient(circle_at_top,#1d4ed8_0%,#0f172a_34%,#020617_100%)]">

    <div
      class="absolute left-1/2 top-[-220px] h-[520px] w-[520px] -translate-x-1/2 rounded-full bg-blue-500/35 blur-3xl">
    </div>
    <div class="absolute bottom-[-180px] right-[-120px] h-[420px] w-[420px] rounded-full bg-cyan-400/25 blur-3xl"></div>
    <div class="absolute bottom-[12%] left-[-160px] h-[360px] w-[360px] rounded-full bg-blue-700/25 blur-3xl"></div>

    <section
      class="relative w-full max-w-md overflow-hidden rounded-[34px] border border-white/15 bg-white/[0.08] p-7 shadow-[0_30px_100px_rgba(0,0,0,0.45)] backdrop-blur-2xl">

      <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300/70 to-transparent"></div>

      <div class="mb-8 text-center">
        <div
          class="mx-auto mb-5 flex h-24 w-24 items-center justify-center overflow-hidden rounded-[30px] bg-slate-950 shadow-2xl shadow-blue-500/25 ring-8 ring-white/10">
          <img src="/public/icons/icon-512.png" alt="ClassClick" class="h-full w-full object-cover" />
        </div>

        <h1 class="text-4xl font-black tracking-tight text-white">
          Class<span class="text-[#16a8ff]">Click</span>
        </h1>

        <p class="mt-3 text-sm font-semibold text-slate-300">
          Ingresá a tu cuenta para continuar
        </p>
      </div>

      <form id="loginForm" method="post" autocomplete="on" class="space-y-5">

        <div class="space-y-2">
          <label for="email" class="block text-sm font-bold text-slate-200">
            Email
          </label>

          <input id="email" name="email" type="email"
            class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3.5 text-sm font-semibold text-white shadow-sm outline-none transition placeholder:text-slate-400 focus:border-[#16a8ff] focus:bg-white/[0.14] focus:ring-4 focus:ring-blue-500/20"
            placeholder="admin@mail.com" required />
        </div>

        <div class="space-y-2">
          <label for="password" class="block text-sm font-bold text-slate-200">
            Contraseña
          </label>

          <input id="password" name="password" type="password"
            class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3.5 text-sm font-semibold text-white shadow-sm outline-none transition placeholder:text-slate-400 focus:border-[#16a8ff] focus:bg-white/[0.14] focus:ring-4 focus:ring-blue-500/20"
            placeholder="********" required />
        </div>

        <div id="errorBox"
          class="hidden rounded-2xl border border-red-300/30 bg-red-500/15 px-4 py-3 text-sm font-semibold text-red-200">
        </div>

        <button id="submitButton" type="submit"
          class="w-full rounded-2xl bg-[#16a8ff] px-5 py-4 text-sm font-black text-white shadow-xl shadow-blue-500/30 transition hover:bg-[#0284c7] active:scale-[0.99]">
          Ingresar
        </button>

      </form>

      <p class="mt-8 text-center text-xs font-bold text-slate-400">
        Plataforma deportiva y educativa
      </p>

    </section>

  </main>

  <script type="module" src="/src/pages/auth/login.js"></script>

</body>

</html>
