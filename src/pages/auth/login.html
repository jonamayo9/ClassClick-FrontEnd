<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassClick</title>

  <link rel="manifest" href="/public/manifest.json" />
  <meta name="theme-color" content="#020617" />
  <link rel="stylesheet" href="/public/assets/app.css" />
</head>

<body class="min-h-screen bg-slate-950">

  <main
    class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-8 bg-[radial-gradient(circle_at_top,#2563eb_0%,#0f172a_38%,#020617_100%)]">

    <!-- Glow superior -->
    <div
      class="absolute left-1/2 top-[-220px] h-[620px] w-[620px] -translate-x-1/2 rounded-full bg-blue-500/50 blur-3xl">
    </div>

    <!-- Glow inferior derecho -->
    <div class="absolute bottom-[-220px] right-[-120px] h-[520px] w-[520px] rounded-full bg-cyan-400/40 blur-3xl">
    </div>

    <!-- Glow lateral -->
    <div class="absolute bottom-[10%] left-[-180px] h-[420px] w-[420px] rounded-full bg-blue-700/30 blur-3xl">
    </div>

    <!-- Card -->
    <section
      class="relative w-full max-w-lg overflow-hidden rounded-[38px] border border-white/10 bg-slate-900/70 p-10 shadow-[0_40px_120px_rgba(0,0,0,0.55)] ring-1 ring-white/10 backdrop-blur-2xl">

      <!-- Línea glow -->
      <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300/70 to-transparent">
      </div>

      <!-- Header -->
      <div class="mb-10 text-center">

        <div
          class="mx-auto mb-6 flex h-28 w-28 items-center justify-center overflow-hidden rounded-[34px] bg-slate-950 shadow-2xl shadow-blue-500/30 ring-8 ring-white/10">

          <img src="/public/icons/icon-512.png" alt="ClassClick" class="h-full w-full object-cover" />

        </div>

        <h1 class="text-5xl font-black tracking-tight text-white">
          Class<span class="text-[#16a8ff]">Click</span>
        </h1>

        <p class="mt-4 text-base font-semibold text-slate-300">
          Ingresá a tu cuenta para continuar
        </p>

      </div>

      <!-- Form -->
      <form id="loginForm" method="post" autocomplete="on" class="space-y-6">

        <!-- Email -->
        <div class="space-y-2">

          <label for="email" class="block text-sm font-bold text-slate-200">
            Email
          </label>

          <input id="email" name="email" type="email" placeholder="admin@mail.com" required
            class="w-full rounded-2xl border border-white/10 bg-slate-800/80 px-5 py-4 text-base font-semibold text-white shadow-sm outline-none transition placeholder:text-slate-400 focus:border-[#16a8ff] focus:bg-slate-800 focus:ring-4 focus:ring-blue-500/20" />

        </div>

        <!-- Password -->
        <div class="space-y-2">

          <label for="password" class="block text-sm font-bold text-slate-200">
            Contraseña
          </label>

          <input id="password" name="password" type="password" placeholder="********" required
            class="w-full rounded-2xl border border-white/10 bg-slate-800/80 px-5 py-4 text-base font-semibold text-white shadow-sm outline-none transition placeholder:text-slate-400 focus:border-[#16a8ff] focus:bg-slate-800 focus:ring-4 focus:ring-blue-500/20" />

        </div>

        <!-- Error -->
        <div id="errorBox"
          class="hidden rounded-2xl border border-red-300/30 bg-red-500/15 px-4 py-3 text-sm font-semibold text-red-200">
        </div>

        <!-- Button -->
        <button id="submitButton" type="submit"
          class="w-full rounded-2xl bg-gradient-to-r from-[#16a8ff] to-[#0ea5e9] px-5 py-4 text-base font-black text-white shadow-2xl shadow-blue-500/30 transition hover:scale-[1.01] hover:from-[#1db4ff] hover:to-[#38bdf8] active:scale-[0.99]">

          Ingresar

        </button>

      </form>

      <!-- Footer -->
      <p class="mt-10 text-center text-sm font-bold text-slate-400">
        Plataforma deportiva y educativa
      </p>

    </section>

  </main>

  <script type="module" src="/src/pages/auth/login.js"></script>

</body>

</html>
