<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ClassClick</title>
  <link rel="manifest" href="/public/manifest.json" />
<meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="/public/assets/app.css" />
</head>
<body class="min-h-screen">
  <main class="flex min-h-screen items-center justify-center p-4">
    <div class="card w-full max-w-md p-6 sm:p-8">
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-slate-900">ClassClick</h1>
        <p class="mt-2 text-sm text-slate-500">
          Ingresá a tu cuenta
        </p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label for="email" class="label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="input"
            placeholder="admin@mail.com"
            required
          />
        </div>

        <div>
          <label for="password" class="label">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input"
            placeholder="********"
            required
          />
        </div>

        <div id="errorBox" class="hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

        <button id="submitButton" type="submit" class="btn-primary">
          Ingresar
        </button>
      </form>
    </div>
  </main>

  <script type="module" src="/src/pages/auth/login.js"></script>
</body>
</html>
