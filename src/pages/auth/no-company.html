<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin empresa asignada | ClassClick</title>
  <link rel="stylesheet" href="/public/assets/app.css" />
</head>
<body class="min-h-screen bg-slate-100">
  <main class="flex min-h-screen items-center justify-center p-4">
    <div class="card w-full max-w-lg p-8 text-center">
      <h1 class="text-2xl font-bold text-slate-900">Usuario sin empresa asignada</h1>
      <p class="mt-3 text-sm text-slate-600">
        Tu usuario fue creado correctamente, pero todavía no tiene ninguna empresa asignada.
      </p>
      <p class="mt-2 text-sm text-slate-600">
        Pedile a un SuperAdmin que te asigne al menos una empresa para poder usar el panel.
      </p>

      <a
        href="/src/pages/auth/login.html"
        class="mt-6 inline-flex rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">
        Volver al login
      </a>
    </div>
  </main>
</body>
</html>
